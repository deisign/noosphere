version: "0.1"
project: "NOOSPHERE"
updated: "2026-07-08"

principle: >
  Sources are split by editorial function. Signal sources produce candidate topics.
  Media sources provide real image/audio/video candidates with provenance and license.
  Quote sources provide verifiable textual candidates. LLMs may interpret, rank,
  connect and reject candidates, but must not invent quotes, artworks, licenses or sources.

source_types:
  rss_signal:
    description: "Editorial signal feeds for discovering candidate materials."
  media_api:
    description: "APIs/search endpoints for real visual/audio/video candidates."
  quote_api:
    description: "APIs/search endpoints for public-domain or verifiable textual candidates."
  archive_api:
    description: "Large archives usable for both signal and media retrieval."
  manual:
    description: "Manual/research source. Not yet automated."

editorial_roles:
  mistral:
    role: "Archivist / primary editor"
    tasks:
      - "summarize signal"
      - "assign issue and rubric"
      - "write editorial brief"
      - "generate search queries for media and quote retrieval"
      - "rank retrieved candidates"
  grok:
    role: "Mad associative editor"
    tasks:
      - "generate weird cultural angle"
      - "suggest unexpected analogies"
      - "propose speculative but clearly labelled reading"
      - "must not assert unchecked facts"
  deepseek:
    role: "Skeptic / fact-checker"
    tasks:
      - "check factual claims"
      - "flag weak or unsupported assertions"
      - "check license/provenance risk"
      - "reject hallucinated or unverifiable media/quotes"
  final_editor:
    role: "Packet assembler"
    tasks:
      - "merge model outputs"
      - "produce final Markdown card"
      - "assign text_readiness"

readiness_statuses:
  - seed
  - scored
  - brief_ready
  - essay_ready
  - publish_candidate

