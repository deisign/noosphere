    notes: "Add SRU/API endpoints after testing."

editorial_packet_schema:
  frontmatter:
    - title
    - issue
    - issue_title
    - rubric
    - status
    - ai_verdict
    - ai_score
    - source
    - url
    - date
    - text_readiness
  sections:
    - Raw Signal
    - Editorial Brief
    - Proposed Angle
    - Grok Angle
    - Quote Candidates
    - Media Candidates
    - DeepSeek Factcheck
    - Text Readiness
