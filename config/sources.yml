media_sources:
  - id: library-of-congress
    name: "Library of Congress"
    type: "media_api"
    active: true
    requires_key: false
    endpoint: "https://www.loc.gov/search/"
    query_template: "https://www.loc.gov/search/?fo=json&fa=online-format:image&q={{query}}"
    use_for:
      - "media"
      - "archive"
      - "american-history"
      - "maps"
      - "photos"
      - "prints"
    license_policy: "Check item rights field. Prefer public domain / no known restrictions."

  - id: wikimedia-commons
    name: "Wikimedia Commons"
    type: "media_api"
    active: true
    requires_key: false
    endpoint: "https://commons.wikimedia.org/w/api.php"
    query_template: "https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch={{query}}&gsrnamespace=6&prop=imageinfo&iiprop=url|size|mime|extmetadata&format=json"
    use_for:
      - "media"
      - "images"
      - "illustrations"
      - "diagrams"
    license_policy: "Use extmetadata. Prefer Public Domain, CC0, CC BY, CC BY-SA. Reject unclear licenses."

  - id: nasa-images
    name: "NASA Images"
    type: "media_api"
    active: true
    requires_key: false
    endpoint: "https://images-api.nasa.gov/search"
    query_template: "https://images-api.nasa.gov/search?q={{query}}&media_type=image"
    use_for:
      - "media"
      - "space"
      - "technology"
      - "retrofuture"
    license_policy: "Check NASA media usage notes and item metadata."

  - id: wellcome-collection
    name: "Wellcome Collection"
    type: "media_api"
    active: true
    requires_key: false
    endpoint: "https://api.wellcomecollection.org/catalogue/v2/works"
    query_template: "https://api.wellcomecollection.org/catalogue/v2/works?query={{query}}&include=identifiers,items,production,subjects,genres"
    use_for:
      - "media"
      - "medicine"
      - "body"
      - "science-history"
      - "occult-science"
    license_policy: "Check item license and access conditions."

  - id: europeana
    name: "Europeana"
    type: "media_api"
    active: false
    requires_key: true
    env_key: "EUROPEANA_API_KEY"
    endpoint: "https://api.europeana.eu/record/v2/search.json"
    query_template: "https://api.europeana.eu/record/v2/search.json?wskey={{EUROPEANA_API_KEY}}&query={{query}}&media=true&reusability=open"
    use_for:
      - "media"
      - "european-archives"
      - "art"
      - "design"
    license_policy: "Prefer reusability=open. Check rights field."

  - id: rijksmuseum
    name: "Rijksmuseum"
    type: "media_api"
    active: false
    requires_key: true
    env_key: "RIJKSMUSEUM_API_KEY"
    endpoint: "https://www.rijksmuseum.nl/api/en/collection"
    query_template: "https://www.rijksmuseum.nl/api/en/collection?key={{RIJKSMUSEUM_API_KEY}}&q={{query}}&imgonly=True"
    use_for:
      - "media"
      - "art"
      - "early-modern"
      - "visual-atmosphere"
    license_policy: "Check object webImage and rights metadata."

quote_sources:
  - id: gutendex
    name: "Gutendex / Project Gutenberg metadata"
    type: "quote_api"
    active: true
    requires_key: false
    endpoint: "https://gutendex.com/books"
    query_template: "https://gutendex.com/books?copyright=false&languages=en&search={{query}}"
    use_for:
      - "quotes"
      - "public-domain-books"
      - "literary-context"
    license_policy: "Use copyright=false. Quote extraction must use actual text format URL from formats."

  - id: internet-archive
    name: "Internet Archive Advanced Search"
    type: "archive_api"
    active: true
    requires_key: false
    endpoint: "https://archive.org/advancedsearch.php"
    query_template: "https://archive.org/advancedsearch.php?q={{query}}&fl[]=identifier&fl[]=title&fl[]=creator&fl[]=year&fl[]=licenseurl&fl[]=publicdate&rows=10&page=1&output=json"
    use_for:
      - "quotes"
      - "media"
      - "books"
      - "periodicals"
      - "film"
      - "audio"
    license_policy: "Check licenseurl and metadata. Do not assume public domain."

  - id: project-gutenberg-manual
    name: "Project Gutenberg full text"
    type: "manual"
    active: true
    requires_key: false
    endpoint: "https://www.gutenberg.org/"
    use_for:
      - "quotes"
      - "full-text"
    license_policy: "Use only public-domain texts appropriate for target jurisdiction."

manual_research_sources:
  - id: biodiversity-heritage-library
    name: "Biodiversity Heritage Library"
